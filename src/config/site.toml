[config.site]
title = "陈年往事"
description = "一个普通人记录一些陈年往事。"
pageTitle = "陈年往事 | 一个普通人的喃喃自语"
pageDescription = "一个普通人的喃喃自语，记录自己的学习、工作、生活经历。"
# 页面顶部GitHub Logo对应的Url
repository = "https://github.com/outlook2018"
footerNote = ""

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "blue-soft"

[config.comments]
enabled = true
provider = "giscus"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "搜索文章..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
theme = "preferred_color_scheme"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "往事"
handle = "@wangshi"
role = "一杯敬明天，一杯敬过往。"
